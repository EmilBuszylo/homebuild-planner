name: CI

# Job steps match context/foundation/test-plan.md §5 (lint → test → build:ci).
on:
  pull_request:
  push:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build (no DB migrate)
        run: pnpm run build:ci

  e2e:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgresql://homebuild:homebuild@localhost:5432/homebuild_planner
      DIRECT_URL: postgresql://homebuild:homebuild@localhost:5432/homebuild_planner
      TEST_RUN_ID: ${{ github.run_id }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: homebuild
          POSTGRES_PASSWORD: homebuild
          POSTGRES_DB: homebuild_planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homebuild -d homebuild_planner -h 127.0.0.1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: PLAYWRIGHT_BROWSERS_PATH=0 pnpm exec playwright install chromium --with-deps

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed database
        run: pnpm db:seed

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
